<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Performance MCP Demo Recording</title>
    <link rel="stylesheet" href="/recording-cursor-ui.css" />
  </head>
  <body class="recording-root">
    <div class="ide-window">
      <header class="ide-titlebar">
        <div class="traffic-lights"><span class="close"></span><span class="minimize"></span><span class="maximize"></span></div>
        <div class="ide-title"><strong>wearedevelopers-presentation</strong> — Cursor</div>
      </header>
      <div class="ide-workspace">
        <nav class="ide-activity-bar" aria-hidden="true">
          <span class="activity-icon">⌂</span><span class="activity-icon active">◇</span><span class="activity-icon">⌕</span>
          <span class="activity-spacer"></span><span class="activity-icon">⚙</span>
        </nav>
        <aside class="ide-sidebar">
          <div class="sidebar-header">Explorer</div>
          <div class="file-tree">
            <div class="file-item"><span class="file-icon">▾</span> wearedevelopers-presentation</div>
            <div class="file-item nested active"><span class="file-icon">{ }</span> mcp.json</div>
          </div>
        </aside>
        <section class="browser-panel">
          <div class="browser-panel-header">
            <span class="browser-panel-title">Chrome · controlled by MCP</span>
            <span class="browser-mcp-pill">Live browser</span>
          </div>
          <div class="browser-stage">
            <div class="chrome-window" id="chrome-window">
              <div class="chrome-toolbar">
                <div class="dots"><span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span></div>
                <div class="tab" id="browser-tab-label">Demo Form · localhost</div>
                <div id="url-bar" class="url-bar">http://localhost:5173/?slide=demo-form</div>
              </div>
              <iframe id="demo-frame" class="demo-frame" src="about:blank" title="Demo form"></iframe>
              <div id="devtools-drawer" class="devtools-drawer" aria-hidden="true">
                <div class="devtools-drawer-tabs">
                  <span>Console</span><span>Network</span><span class="active">Performance</span>
                </div>
                <div class="devtools-drawer-body">
                  <div class="devtools-drawer-label">CPU timeline</div>
                  <div class="perf-bars" id="perf-bars">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                  </div>
                  <div class="devtools-field"><label>Trace duration</label><span id="metric-trace" class="flash-target">847 ms</span></div>
                  <div class="devtools-field"><label>Heap snapshot</label><span id="metric-heap" class="flash-target">24.3 MB</span></div>
                </div>
              </div>
            </div>
          </div>
          <div id="recording-phase" class="recording-phase">Prompt</div>
          <div id="chrome-caption" class="chrome-caption"></div>
        </section>
        <aside class="agent-panel">
          <div class="agent-header"><div class="agent-header-title">Chat <span class="agent-header-badge">Agent</span></div></div>
          <div id="cursor-thread" class="cursor-thread"></div>
          <div class="cursor-composer">
            <div class="composer-toolbar"><div class="composer-mode"><span class="composer-mode-pill">Agent</span></div></div>
            <div class="composer-box"><div id="composer-text" class="composer-text cursor-blink"></div></div>
          </div>
        </aside>
      </div>
      <footer class="ide-statusbar"><div class="status-right" id="chrome-connect-status"><span class="status-item">MCP · connecting…</span></div></footer>
    </div>
    <script src="/recording-cursor-ui.js"></script>
    <script>
      createCursorRecordingUI({
        userPrompt: "Profile the demo registration form — run performance_trace while I submit, then take_memory_snapshot and summarize bottlenecks.",
        thinkingText: "Connect via MCP, record a performance trace on form interaction, capture heap snapshot, summarize CPU and memory findings.",
        agentIntroMessage: "I'll trace CPU on the live demo form, capture a memory snapshot, and summarize performance findings.",
        chromeUrl: "http://localhost:5173/?slide=demo-form",
        frameUrl: "/?slide=demo-form&embed=form",
        browserUrl: "http://127.0.0.1:9223",
        browserTab: "Demo Form · localhost",
        projectFile: "performance",
      })
    </script>
  </body>
</html>
