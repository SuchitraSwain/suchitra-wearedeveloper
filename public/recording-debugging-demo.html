<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Debugging MCP Demo Recording</title>
    <link rel="stylesheet" href="/recording-cursor-ui.css" />
  </head>
  <body class="recording-root">
    <div class="ide-window">
      <header class="ide-titlebar">
        <div class="traffic-lights"><span class="close"></span><span class="minimize"></span><span class="maximize"></span></div>
        <div class="ide-title"><strong>wearedevelopers-presentation</strong> — Cursor</div>
      </header>
      <div class="ide-workspace">
        <nav class="ide-activity-bar" aria-hidden="true">
          <span class="activity-icon active">◇</span><span class="activity-spacer"></span>
        </nav>
        <aside class="ide-sidebar"><div class="sidebar-header">Explorer</div></aside>
        <section class="browser-panel">
          <div class="browser-panel-header">
            <span class="browser-panel-title">Chrome · controlled by MCP</span>
            <span class="browser-mcp-pill">Live browser</span>
          </div>
          <div class="browser-stage">
            <div class="chrome-window" id="chrome-window">
              <div class="chrome-toolbar">
                <div class="dots"><span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span></div>
                <div class="tab" id="browser-tab-label">Portfolio · suchitra-swain.web.app</div>
                <div id="url-bar" class="url-bar">https://suchitra-swain.web.app/</div>
              </div>
              <iframe id="demo-frame" class="demo-frame" src="about:blank" title="Portfolio"></iframe>
              <div id="devtools-drawer" class="devtools-drawer" aria-hidden="true">
                <div class="devtools-drawer-tabs">
                  <span>Console</span><span class="active">Lighthouse</span>
                </div>
                <div class="devtools-drawer-body">
                  <div class="lh-scores">
                    <div class="lh-score"><strong id="lh-perf">92</strong><span>Perf</span></div>
                    <div class="lh-score"><strong>96</strong><span>A11y</span></div>
                    <div class="lh-score"><strong>88</strong><span>BP</span></div>
                    <div class="lh-score"><strong>91</strong><span>SEO</span></div>
                  </div>
                  <div class="devtools-field"><label>Screenshot</label><span id="metric-screenshot" class="flash-target">viewport.png captured</span></div>
                </div>
              </div>
            </div>
          </div>
          <div id="recording-phase" class="recording-phase">Prompt</div>
          <div id="chrome-caption" class="chrome-caption"></div>
        </section>
        <aside class="agent-panel">
          <div id="cursor-thread" class="cursor-thread"></div>
          <div class="cursor-composer"><div id="composer-text" class="composer-text cursor-blink"></div></div>
        </aside>
      </div>
      <footer class="ide-statusbar"><div class="status-right" id="chrome-connect-status"></div></footer>
    </div>
    <script src="/recording-cursor-ui.js"></script>
    <script>
      createCursorRecordingUI({
        userPrompt: "Audit https://suchitra-swain.web.app/ — run lighthouse_audit and take_screenshot, then summarize scores and issues.",
        agentIntroMessage: "I'll run Lighthouse on your live portfolio and capture a screenshot for the audit report.",
        chromeUrl: "https://suchitra-swain.web.app/",
        frameUrl: "https://suchitra-swain.web.app/",
        browserUrl: "http://127.0.0.1:9223",
        browserTab: "Portfolio · suchitra-swain.web.app",
        projectFile: "debugging",
      })
    </script>
  </body>
</html>
